<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POST Request Demo</title>
</head>
<body>
    <h1>POST Request Demo</h1>

    <button id="postButton">Send POST Request</button>

    <script>
        // Paste the JavaScript code provided in the previous response here
        const apiUrl = 'http://localhost:3001/login'; // Replace with your server's URL

        const dataToSend = {
           "username": "Luc43",
             "password": "Axgp231@!"
                };

        document.getElementById('postButton').addEventListener('click', () => {
            fetch(apiUrl, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                // Add any other headers as needed
              },
              body: JSON.stringify(dataToSend),
            })
              .then(response => {
                if (!response.ok) {
                  throw new Error(`HTTP error! Status: ${response.status}`);
                }
                return response.json();
              })
              .then(data => {
                console.log('Response data:', data);
                alert('POST request successful!');
              })
              .catch(error => {
                console.error('Fetch error:', error);
                alert('Error: POST request failed.');
              });
        });
    </script>
</body>
</html>
